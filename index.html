<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* header */

.header{
background:#2c3e50;
color:white;
padding:15px 30px;
font-size:20px;
}

/* sidebar */

.sidebar{
width:220px;
height:100vh;
background:#34495e;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#2c3e50;
}

/* main */

.main{
margin-left:220px;
padding:30px;
}

/* cards */

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
width:200px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
color:#555;
}

.card p{
font-size:28px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
Dashboard
</div>

<div class="sidebar">

<a href="#">Bosh sahifa</a>
<a href="#">Foydalanuvchilar</a>
<a href="#">Statistika</a>
<a href="#">Hisobotlar</a>
<a href="#">Sozlamalar</a>

</div>

<div class="main">

<h2>Bosh Oyna</h2>

<div class="cards">

<div class="card">
<h3>Foydalanuvchilar</h3>
<p>120</p>
</div>

<div class="card">
<h3>Buyurtmalar</h3>
<p>54</p>
</div>

<div class="card">
<h3>Daromad</h3>
<p>$1,200</p>
</div>

</div>

</div>

</body>
</html>
