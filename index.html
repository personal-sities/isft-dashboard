<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

.sidebar{
width:220px;
height:100vh;
background:#2f3640;
color:white;
position:fixed;
padding:20px;
}

.main{
margin-left:240px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
display:inline-block;
margin:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<p>Home</p>
<p>Users</p>
<p>Reports</p>
</div>

<div class="main">

<div class="card">
<h3>Users</h3>
<h1>120</h1>
</div>

<div class="card">
<h3>Sales</h3>
<h1>540</h1>
</div>

<canvas id="chart"></canvas>

</div>

<script>

const ctx=document.getElementById('chart');

new Chart(ctx,{
type:'bar',
data:{
labels:['Jan','Feb','Mar','Apr'],
datasets:[{
label:'Sales',
data:[12,19,8,15],
backgroundColor:'#4cd137'
}]
}
});

</script>

</body>
</html>
